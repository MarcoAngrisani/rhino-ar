<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Step D — IMU + Three.js</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#000; color:#fff; overflow:hidden; height:100dvh; width:100vw; }

#splash {
  position:fixed; inset:0; z-index:100; background:#0a0a0f;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1.5rem; padding:2rem; text-align:center;
}
.version { font-size:.65rem; letter-spacing:.12em; opacity:.4; text-transform:uppercase; }
h1 { font-size:2.4rem; letter-spacing:-.02em; text-transform:uppercase; }
h1 span { color:#e8410a; }
#splash p { font-size:.85rem; opacity:.6; max-width:300px; line-height:1.5; }
button {
  background:#e8410a; color:#fff; border:none;
  padding:.9rem 2.4rem; font-family:Arial,sans-serif; font-size:1rem;
  letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
button:active { opacity:.8; }

#perm-modal {
  position:fixed; inset:0; z-index:150; background:rgba(10,10,15,.95);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  gap:1.2rem; padding:2rem; text-align:center;
}
#perm-modal.show { display:flex; }
.ico { font-size:2.5rem; }
#perm-modal h2 { font-size:1.1rem; text-transform:uppercase; letter-spacing:.06em; }
#perm-modal p { font-size:.8rem; opacity:.55; max-width:280px; line-height:1.6; }

#cam { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; }
#c3d { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; }

#status {
  position:fixed; top:1rem; left:1rem; right:1rem;
  background:rgba(10,10,15,.75); backdrop-filter:blur(10px);
  padding:.6rem .9rem; border-left:3px solid #e8410a;
  font-size:.72rem; letter-spacing:.06em; text-transform:uppercase;
  pointer-events:none; z-index:10;
}

#info {
  position:fixed; bottom:1rem; left:1rem; right:1rem;
  background:rgba(10,10,15,.75); backdrop-filter:blur(10px);
  padding:.7rem .9rem; font-size:.7rem; line-height:1.8;
  pointer-events:none; z-index:10; font-family: 'Courier New', monospace;
}
.kv { display:flex; justify-content:space-between; gap:1rem; }
.kv span:first-child { opacity:.55; }
</style>
</head>
<body>

<div id="splash">
  <div class="version">v0.8 — Step D: IMU + Three.js</div>
  <h1>STEP <span>D</span></h1>
  <p>Test sync IMU: il cubo arancione deve restare fermo nello spazio mentre ruoti il telefono.</p>
  <button id="btn-start">AVVIA</button>
</div>

<div id="perm-modal">
  <div class="ico">📡</div>
  <h2>Giroscopio</h2>
  <p>Necessario per ruotare la vista 3D in sync col telefono</p>
  <button id="btn-gyro">AUTORIZZA</button>
</div>

<video id="cam" autoplay playsinline muted></video>
<canvas id="c3d"></canvas>

<div id="status">In attesa…</div>

<div id="info">
  <div class="kv"><span>α (yaw)</span><span id="i-a">—</span></div>
  <div class="kv"><span>β (pitch)</span><span id="i-b">—</span></div>
  <div class="kv"><span>γ (roll)</span><span id="i-g">—</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

const video  = document.getElementById('cam');
const canvas = document.getElementById('c3d');
let renderer, scene, cam3;

// IMU state
const IMU = { a:0, b:0, g:0, ready:false };

function setStatus(t) { document.getElementById('status').textContent = t; }

// ─────────────────────────────────────
// CAMERA
// ─────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    return true;
  } catch(e) {
    setStatus('Camera non disponibile');
    return false;
  }
}

// ─────────────────────────────────────
// IMU — W3C quaternion (no gimbal lock)
// ─────────────────────────────────────
function onOrientation(e) {
  if (e.alpha === null && e.beta === null) return;
  IMU.a = e.alpha || 0;
  IMU.b = e.beta  || 0;
  IMU.g = e.gamma || 0;
  if (!IMU.ready) {
    IMU.ready = true;
    setStatus('Giroscopio attivo — ruota il telefono');
  }
}

async function requestGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const r = await DeviceOrientationEvent.requestPermission();
      if (r === 'granted') {
        window.addEventListener('deviceorientation', onOrientation, true);
        return true;
      }
    } catch(e) {}
    return false;
  }
  window.addEventListener('deviceorientation', onOrientation, true);
  return true;
}

// IMU → Three.js camera quaternion (W3C standard, gimbal-lock free)
// Reference: https://w3c.github.io/deviceorientation/#worked-example
function imuToCamQuat() {
  const a = THREE.MathUtils.degToRad(IMU.a);
  const b = THREE.MathUtils.degToRad(IMU.b);
  const g = THREE.MathUtils.degToRad(IMU.g);

  // Build device quaternion: q = Rz(a) · Rx(b) · Ry(g)
  const ca=Math.cos(a/2), sa=Math.sin(a/2);
  const cb=Math.cos(b/2), sb=Math.sin(b/2);
  const cg=Math.cos(g/2), sg=Math.sin(g/2);

  const qx = sa*cb*cg - ca*sb*sg;
  const qy = ca*cb*sg + sa*sb*cg;
  const qz = ca*sb*cg + sa*cb*sg;
  const qw = ca*cb*cg - sa*sb*sg;

  // Wait — the official W3C formula is:
  // q = Rz(α) · Rx(β) · Ry(γ)
  // which gives the rotation from EARTH frame to DEVICE frame.
  // The components (with Three.js Y-up convention):
  const qDev = new THREE.Quaternion();
  qDev.setFromEuler(new THREE.Euler(b, a, -g, 'YXZ'));
  // ↑ This is mathematically equivalent for our purpose but built-in is more readable.
  // The order 'YXZ' here means: first rotate around Y by α, then X by β, then Z by -γ.

  // Now we need to rotate the camera so that:
  //   - phone vertical (β=90°)  → camera looks at horizon (Three.js looks at -Z)
  //   - phone tilted down (β=0) → camera looks at floor
  //
  // The transform: rotate -90° around X (world frame) brings the
  // device frame in line with the Three.js camera convention.
  const align = new THREE.Quaternion().setFromAxisAngle(
    new THREE.Vector3(1, 0, 0), -Math.PI / 2
  );

  return qDev.multiply(align);
}

// ─────────────────────────────────────
// THREE.JS SCENE
// ─────────────────────────────────────
function initThree() {
  renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0,0);

  scene = new THREE.Scene();
  cam3 = new THREE.PerspectiveCamera(62, window.innerWidth/window.innerHeight, 0.05, 200);
  cam3.position.set(0, 1.7, 0); // altezza occhi
  // orientation will be driven by IMU

  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(3, 8, 3);
  scene.add(dir);

  // Cubo arancione — al centro a 2m davanti
  const cubeGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
  const cubeMat = new THREE.MeshPhongMaterial({ color: 0xe8410a, opacity: 0.85, transparent: true });
  const cube = new THREE.Mesh(cubeGeo, cubeMat);
  cube.position.set(0, 1.0, -2);
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(cubeGeo),
    new THREE.LineBasicMaterial({ color: 0xffffff })
  );
  cube.add(edges);
  scene.add(cube);

  // Cubo BLU a destra (per testare rotazione yaw)
  const cubeBlue = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 0.4, 0.4),
    new THREE.MeshPhongMaterial({ color: 0x4a9eff, opacity:.85, transparent:true })
  );
  cubeBlue.position.set(2, 1.0, 0); // 2m a destra
  cubeBlue.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(cubeBlue.geometry),
    new THREE.LineBasicMaterial({ color: 0xffffff })
  ));
  scene.add(cubeBlue);

  // Cubo VERDE a sinistra
  const cubeGreen = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 0.4, 0.4),
    new THREE.MeshPhongMaterial({ color: 0x1a9e5c, opacity:.85, transparent:true })
  );
  cubeGreen.position.set(-2, 1.0, 0);
  cubeGreen.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(cubeGreen.geometry),
    new THREE.LineBasicMaterial({ color: 0xffffff })
  ));
  scene.add(cubeGreen);

  // Griglia
  const grid = new THREE.GridHelper(10, 10, 0x666666, 0x333333);
  scene.add(grid);

  // Sfera origine
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 12, 12),
    new THREE.MeshPhongMaterial({ color: 0xff0000 })
  );
  scene.add(sphere);

  // Assi
  scene.add(new THREE.AxesHelper(0.5));

  window.addEventListener('resize', () => {
    cam3.aspect = window.innerWidth / window.innerHeight;
    cam3.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Loop
  function loop() {
    requestAnimationFrame(loop);
    if (IMU.ready) cam3.quaternion.copy(imuToCamQuat());
    renderer.render(scene, cam3);
    document.getElementById('i-a').textContent = IMU.a.toFixed(1) + '°';
    document.getElementById('i-b').textContent = IMU.b.toFixed(1) + '°';
    document.getElementById('i-g').textContent = IMU.g.toFixed(1) + '°';
  }
  loop();
}

// ─────────────────────────────────────
// BOOT
// ─────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', async () => {
  document.getElementById('splash').style.display = 'none';
  const ok = await startCamera();
  if (!ok) return;
  setStatus('Camera OK — autorizza giroscopio');
  initThree();

  const needsPerm = typeof DeviceOrientationEvent !== 'undefined' &&
                    typeof DeviceOrientationEvent.requestPermission === 'function';
  if (needsPerm) {
    document.getElementById('perm-modal').classList.add('show');
  } else {
    await requestGyro();
  }
});

document.getElementById('btn-gyro').addEventListener('click', async () => {
  document.getElementById('perm-modal').classList.remove('show');
  const ok = await requestGyro();
  if (!ok) setStatus('Giroscopio negato');
});
</script>
</body>
</html>
