<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Step C — Three.js</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#000; color:#fff; overflow:hidden; height:100dvh; width:100vw; }

#splash {
  position:fixed; inset:0; z-index:100; background:#0a0a0f;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1.5rem; padding:2rem; text-align:center;
}
.version { font-size:.65rem; letter-spacing:.12em; opacity:.4; text-transform:uppercase; }
h1 { font-size:2.4rem; letter-spacing:-.02em; text-transform:uppercase; }
h1 span { color:#e8410a; }
#splash p { font-size:.85rem; opacity:.6; max-width:300px; line-height:1.5; }
button {
  background:#e8410a; color:#fff; border:none;
  padding:.9rem 2.4rem; font-family:Arial,sans-serif; font-size:1rem;
  letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
button:active { opacity:.8; }

#cam { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; }
#c3d { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; }

#status {
  position:fixed; top:1rem; left:1rem; right:1rem;
  background:rgba(10,10,15,.75); backdrop-filter:blur(10px);
  padding:.6rem .9rem; border-left:3px solid #e8410a;
  font-size:.72rem; letter-spacing:.06em; text-transform:uppercase;
  pointer-events:none; z-index:10;
}

#info {
  position:fixed; bottom:1rem; left:1rem; right:1rem;
  background:rgba(10,10,15,.75); backdrop-filter:blur(10px);
  padding:.7rem .9rem; font-size:.72rem; line-height:1.7;
  pointer-events:none; z-index:10;
}
.kv { display:flex; justify-content:space-between; gap:1rem; }
.kv span:first-child { opacity:.55; }
</style>
</head>
<body>

<div id="splash">
  <div class="version">v0.7 — Step C: Three.js statico</div>
  <h1>STEP <span>C</span></h1>
  <p>Test Three.js: deve apparire un cubo arancione a 2m davanti a te, con una griglia a pavimento.</p>
  <button id="btn-start">AVVIA</button>
</div>

<video id="cam" autoplay playsinline muted></video>
<canvas id="c3d"></canvas>

<div id="status">In attesa…</div>

<div id="info">
  <div class="kv"><span>Cubo</span><span>a 2m davanti — lato 0.5m</span></div>
  <div class="kv"><span>Griglia</span><span>10x10m, celle 1m</span></div>
  <div class="kv"><span>Sfera rossa</span><span>origine 0,0,0</span></div>
  <div class="kv"><span>Camera</span><span>altezza 1.7m</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

const video = document.getElementById('cam');
const canvas = document.getElementById('c3d');
let renderer, scene, cam3;

function setStatus(t) { document.getElementById('status').textContent = t; }

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    setStatus('Camera OK — Three.js attivo');
    return true;
  } catch(e) {
    setStatus('Camera non disponibile');
    return false;
  }
}

function initThree() {
  renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0,0);

  scene = new THREE.Scene();

  // Camera Three.js: X=destra, Y=alto, Z=verso osservatore
  // Posizione: altezza occhi 1.7m, sul punto (0,0)
  // Default Three.js camera guarda verso -Z (l'orizzonte)
  cam3 = new THREE.PerspectiveCamera(62, window.innerWidth/window.innerHeight, 0.05, 200);
  cam3.position.set(0, 1.7, 0);
  // Default lookAt: (0,1.7,-1) → guarda l'orizzonte in direzione -Z

  // Luci
  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(3, 8, 3);
  scene.add(dir);

  // ── CUBO a 2m davanti (Z = -2 in Three.js) ──
  const cubeGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
  const cubeMat = new THREE.MeshPhongMaterial({ color: 0xe8410a, opacity: 0.85, transparent: true });
  const cube = new THREE.Mesh(cubeGeo, cubeMat);
  cube.position.set(0, 1.0, -2); // 2m davanti, 1m da terra
  // wireframe edges
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(cubeGeo),
    new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 })
  );
  cube.add(edges);
  scene.add(cube);

  // ── GRIGLIA pavimento ──
  const grid = new THREE.GridHelper(10, 10, 0x666666, 0x333333);
  grid.position.y = 0;
  scene.add(grid);

  // ── SFERA ROSSA origine ──
  const sphereGeo = new THREE.SphereGeometry(0.08, 12, 12);
  const sphereMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  sphere.position.set(0, 0, 0);
  scene.add(sphere);

  // ── ASSI ── (X=rosso, Y=verde verticale, Z=blu)
  const axes = new THREE.AxesHelper(0.5);
  scene.add(axes);

  window.addEventListener('resize', () => {
    cam3.aspect = window.innerWidth / window.innerHeight;
    cam3.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Render loop
  function loop() {
    requestAnimationFrame(loop);
    renderer.render(scene, cam3);
  }
  loop();
}

document.getElementById('btn-start').addEventListener('click', async () => {
  document.getElementById('splash').style.display = 'none';
  const ok = await startCamera();
  if (ok) initThree();
});
</script>
</body>
</html>
