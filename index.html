<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Step L1 — Optical Flow</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#000; color:#fff; overflow:hidden; height:100dvh; width:100vw; }

#splash {
  position:fixed; inset:0; z-index:100; background:#0a0a0f;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1.5rem; padding:2rem; text-align:center;
}
.version { font-size:.65rem; letter-spacing:.12em; opacity:.4; text-transform:uppercase; }
h1 { font-size:2.4rem; letter-spacing:-.02em; text-transform:uppercase; }
h1 span { color:#e8410a; }
#splash p { font-size:.82rem; opacity:.6; max-width:330px; line-height:1.5; }
button {
  background:#e8410a; color:#fff; border:none;
  padding:.9rem 2.4rem; font-family:Arial,sans-serif; font-size:1rem;
  letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
button:active { opacity:.8; }

#cam { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; }
#overlay { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:3; }

#status {
  position:fixed; top:1rem; left:1rem; right:1rem;
  background:rgba(10,10,15,.78); backdrop-filter:blur(10px);
  padding:.55rem .85rem; border-left:3px solid #e8410a;
  font-size:.7rem; letter-spacing:.06em; text-transform:uppercase;
  pointer-events:none; z-index:10;
}

#info {
  position:fixed; bottom:1rem; left:1rem; right:1rem;
  background:rgba(10,10,15,.78); backdrop-filter:blur(10px);
  padding:.65rem .85rem; font-size:.66rem; line-height:1.7;
  pointer-events:none; z-index:10; font-family: 'Courier New', monospace;
}
.kv { display:flex; justify-content:space-between; gap:1rem; }
.kv span:first-child { opacity:.5; }

.tb {
  position:fixed; right:1rem;
  background:rgba(10,10,15,.78); backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15); color:#fff;
  font-family:Arial; font-size:.62rem; letter-spacing:.06em; text-transform:uppercase;
  padding:.45rem .75rem; cursor:pointer; z-index:11;
}
.tb.on { border-color:#e8410a; color:#e8410a; }
#tb-trails { bottom:7.3rem; }
#tb-reset  { bottom:5.8rem; }
</style>
</head>
<body>

<div id="splash">
  <div class="version">v1.3 — Step L1: optical flow</div>
  <h1>STEP <span>L1</span></h1>
  <p>Test optical flow puro. Vedrai puntini verdi che si attaccano alla scena e si muovono insieme ad essa quando muovi il telefono.</p>
  <button id="btn-start">AVVIA</button>
</div>

<video id="cam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
<canvas id="work" style="display:none"></canvas>

<button class="tb on" id="tb-trails">TRAIL</button>
<button class="tb" id="tb-reset">RESET FEAT</button>

<div id="status">In attesa…</div>

<div id="info">
  <div class="kv"><span>Feature tracciati</span><span id="i-n">0</span></div>
  <div class="kv"><span>Feature persi</span><span id="i-lost">0</span></div>
  <div class="kv"><span>Risoluzione OF</span><span id="i-res">—</span></div>
  <div class="kv"><span>FPS OF</span><span id="i-fps">0</span></div>
  <div class="kv"><span>Flusso medio</span><span id="i-flow">—</span></div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════
// SHI-TOMASI CORNER DETECTION + LUCAS-KANADE
// Custom implementation, no external library
// ═══════════════════════════════════════════════
//
// We work on a downscaled grayscale image (e.g. 320×240) for speed.
// Shi-Tomasi finds "good corners" = points where the image gradient
// is strong in BOTH directions (so they can be tracked reliably).
// Lucas-Kanade tracks each corner by solving the optical flow equation
// in a small window (default 9×9) around each point.

// ─── Image utilities ───────────────────────────
function rgbaToGray(rgba, w, h) {
  // Returns Float32Array of length w*h
  const gray = new Float32Array(w * h);
  for (let i = 0, p = 0; p < gray.length; p++, i += 4) {
    // Luminance, ITU-R BT.601 weights
    gray[p] = 0.299 * rgba[i] + 0.587 * rgba[i+1] + 0.114 * rgba[i+2];
  }
  return gray;
}

// Bilinear sample (sub-pixel) from grayscale image
function sample(gray, w, h, x, y) {
  if (x < 0 || x >= w-1 || y < 0 || y >= h-1) return 0;
  const x0 = Math.floor(x), y0 = Math.floor(y);
  const fx = x - x0, fy = y - y0;
  const i = y0 * w + x0;
  const v00 = gray[i];
  const v10 = gray[i + 1];
  const v01 = gray[i + w];
  const v11 = gray[i + w + 1];
  return (1-fx)*(1-fy)*v00 + fx*(1-fy)*v10 + (1-fx)*fy*v01 + fx*fy*v11;
}

// Image gradient at (x, y) via central differences
function gradX(gray, w, h, x, y) {
  return 0.5 * (sample(gray, w, h, x+1, y) - sample(gray, w, h, x-1, y));
}
function gradY(gray, w, h, x, y) {
  return 0.5 * (sample(gray, w, h, x, y+1) - sample(gray, w, h, x, y-1));
}

// ─── Shi-Tomasi corner detector ────────────────
// Find points where min eigenvalue of the structure tensor is large.
// Returns array of {x, y, score} sorted by score, then non-max suppressed.
function detectShiTomasi(gray, w, h, opts={}) {
  const winSize  = opts.winSize  || 5;   // half-window for structure tensor
  const minScore = opts.minScore || 6;   // minimum eigenvalue threshold
  const minDist  = opts.minDist  || 12;  // min pixel distance between features
  const maxFeats = opts.maxFeats || 100;
  const skip     = opts.skip     || 4;   // sample every N pixels (speed)
  const border   = winSize + 2;

  const candidates = [];
  for (let y = border; y < h - border; y += skip) {
    for (let x = border; x < w - border; x += skip) {
      // Structure tensor
      let Sxx = 0, Syy = 0, Sxy = 0;
      for (let dy = -winSize; dy <= winSize; dy++) {
        for (let dx = -winSize; dx <= winSize; dx++) {
          const gx = gradX(gray, w, h, x+dx, y+dy);
          const gy = gradY(gray, w, h, x+dx, y+dy);
          Sxx += gx*gx; Syy += gy*gy; Sxy += gx*gy;
        }
      }
      // Min eigenvalue of [[Sxx,Sxy],[Sxy,Syy]]
      const trace = Sxx + Syy;
      const det   = Sxx*Syy - Sxy*Sxy;
      const disc  = Math.sqrt(Math.max(0, trace*trace/4 - det));
      const lambdaMin = trace/2 - disc;
      const score = lambdaMin / (winSize*winSize*4); // normalize
      if (score > minScore) candidates.push({ x, y, score });
    }
  }

  // Sort by score descending
  candidates.sort((a,b) => b.score - a.score);

  // Non-maximum suppression with minDist
  const selected = [];
  const md2 = minDist * minDist;
  outer:
  for (const c of candidates) {
    for (const s of selected) {
      const dx = c.x - s.x, dy = c.y - s.y;
      if (dx*dx + dy*dy < md2) continue outer;
    }
    selected.push(c);
    if (selected.length >= maxFeats) break;
  }
  return selected;
}

// ─── Lucas-Kanade tracker ─────────────────────
// Track each feature from gray1 to gray2.
// Returns array same length as features, with {x, y, ok} for each.
function trackLK(gray1, gray2, features, w, h, opts={}) {
  const winRadius = opts.winRadius || 4;   // window half-size
  const maxIter   = opts.maxIter   || 8;
  const eps       = opts.eps       || 0.05;
  const maxResidual = opts.maxResidual || 50;

  const out = [];
  for (const f of features) {
    let dx = 0, dy = 0;
    let ok = true;

    // Pre-compute gradients and image patch at the original location (gray1)
    // for the spatial part of LK
    let Gxx = 0, Gyy = 0, Gxy = 0;
    const Ix = [], Iy = [], I1 = [];
    for (let py = -winRadius; py <= winRadius; py++) {
      for (let px = -winRadius; px <= winRadius; px++) {
        const sx = f.x + px, sy = f.y + py;
        const ix = gradX(gray1, w, h, sx, sy);
        const iy = gradY(gray1, w, h, sx, sy);
        Ix.push(ix); Iy.push(iy);
        I1.push(sample(gray1, w, h, sx, sy));
        Gxx += ix*ix; Gyy += iy*iy; Gxy += ix*iy;
      }
    }

    const det = Gxx*Gyy - Gxy*Gxy;
    if (det < 1e-3) { out.push({ x:f.x, y:f.y, ok:false }); continue; }

    const invDet = 1 / det;

    // Iterative refinement
    for (let iter = 0; iter < maxIter; iter++) {
      let bx = 0, by = 0;
      let idx = 0;
      for (let py = -winRadius; py <= winRadius; py++) {
        for (let px = -winRadius; px <= winRadius; px++) {
          const sx2 = f.x + px + dx;
          const sy2 = f.y + py + dy;
          const I2 = sample(gray2, w, h, sx2, sy2);
          const dI = I1[idx] - I2;
          bx += Ix[idx] * dI;
          by += Iy[idx] * dI;
          idx++;
        }
      }
      // Solve [Gxx Gxy; Gxy Gyy] · [vx; vy] = [bx; by]
      const vx = (Gyy*bx - Gxy*by) * invDet;
      const vy = (Gxx*by - Gxy*bx) * invDet;
      dx += vx; dy += vy;
      if (Math.abs(vx) < eps && Math.abs(vy) < eps) break;
    }

    // Verify residual: was the match plausible?
    let residual = 0;
    let idx = 0;
    for (let py = -winRadius; py <= winRadius; py++) {
      for (let px = -winRadius; px <= winRadius; px++) {
        const d = I1[idx] - sample(gray2, w, h, f.x+px+dx, f.y+py+dy);
        residual += d*d;
        idx++;
      }
    }
    residual = Math.sqrt(residual / I1.length);
    if (residual > maxResidual) ok = false;

    const nx = f.x + dx, ny = f.y + dy;
    if (nx < winRadius || nx > w-winRadius-1 || ny < winRadius || ny > h-winRadius-1) ok = false;

    out.push({ x: nx, y: ny, ok, residual });
  }
  return out;
}

// ═══════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════
const OF_W = 320; // optical-flow working width
let OF_H;         // computed from aspect ratio

const video    = document.getElementById('cam');
const overlay  = document.getElementById('overlay');
const overCtx  = overlay.getContext('2d');
const work     = document.getElementById('work');
const workCtx  = work.getContext('2d', { willReadFrequently: true });

const STATE = {
  camOk: false,
  prevGray: null,
  features: [],   // array of {x, y, age, vx, vy, history}
  showTrails: true,
  lastT: 0,
  fpsT: 0, frames: 0, fps: 0,
  redetectCounter: 0,
  lostTotal: 0,
};

function setStatus(t) { document.getElementById('status').textContent = t; }

// ═══════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    STATE.camOk = true;
    OF_H = Math.round(OF_W * video.videoHeight / video.videoWidth);
    work.width = OF_W; work.height = OF_H;
    document.getElementById('i-res').textContent = OF_W + '×' + OF_H;
    return true;
  } catch(e) { setStatus('Camera non disponibile'); return false; }
}

function getCoverTransform(vw, vh) {
  const sw = window.innerWidth, sh = window.innerHeight;
  const vA = vw/vh, sA = sw/sh;
  let scale, offX=0, offY=0;
  if (vA > sA) { scale = sh/vh; offX = (sw - vw*scale)/2; }
  else         { scale = sw/vw; offY = (sh - vh*scale)/2; }
  return { scale, offX, offY };
}

function resizeOverlay() {
  const dpr = window.devicePixelRatio || 1;
  overlay.width  = window.innerWidth  * dpr;
  overlay.height = window.innerHeight * dpr;
  overlay.style.width  = window.innerWidth  + 'px';
  overlay.style.height = window.innerHeight + 'px';
  overCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ═══════════════════════════════════════════════
// DRAW FEATURES
// ═══════════════════════════════════════════════
function drawFeatures(T) {
  // T maps OF (320×OF_H) coordinates into screen pixels.
  // But the video on screen uses object-fit:cover scaling from the full
  // video size (e.g. 1280×720), so we need to scale our OF coords
  // up to video coords first.
  const ofToVid = video.videoWidth / OF_W;

  overCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

  for (const f of STATE.features) {
    const vx = f.x * ofToVid;
    const vy = f.y * ofToVid;
    const sx = vx * T.scale + T.offX;
    const sy = vy * T.scale + T.offY;

    // Trail
    if (STATE.showTrails && f.history && f.history.length > 1) {
      overCtx.beginPath();
      for (let i = 0; i < f.history.length; i++) {
        const hx = f.history[i].x * ofToVid * T.scale + T.offX;
        const hy = f.history[i].y * ofToVid * T.scale + T.offY;
        if (i === 0) overCtx.moveTo(hx, hy);
        else overCtx.lineTo(hx, hy);
      }
      overCtx.strokeStyle = 'rgba(26, 158, 92, 0.6)';
      overCtx.lineWidth = 1.5;
      overCtx.stroke();
    }

    // Point
    overCtx.fillStyle = '#1a9e5c';
    overCtx.beginPath();
    overCtx.arc(sx, sy, 3.5, 0, Math.PI*2);
    overCtx.fill();
    overCtx.strokeStyle = 'rgba(0,0,0,.5)';
    overCtx.lineWidth = 1;
    overCtx.stroke();
  }
}

// ═══════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════
function detectFeatures(gray) {
  const corners = detectShiTomasi(gray, OF_W, OF_H, {
    winSize: 4,
    minScore: 5,
    minDist: 14,
    maxFeats: 80,
    skip: 4,
  });
  return corners.map(c => ({
    x: c.x, y: c.y, age: 0, history: [{x:c.x, y:c.y}]
  }));
}

function loop(now) {
  requestAnimationFrame(loop);
  if (!STATE.camOk) return;
  if (now - STATE.lastT < 80) return; // ~12fps target
  STATE.lastT = now;

  // Draw downscaled video frame
  workCtx.drawImage(video, 0, 0, OF_W, OF_H);
  const img = workCtx.getImageData(0, 0, OF_W, OF_H);
  const gray = rgbaToGray(img.data, OF_W, OF_H);

  // First frame: just detect features
  if (!STATE.prevGray) {
    STATE.prevGray = gray;
    STATE.features = detectFeatures(gray);
    setStatus(`Inizio tracking — ${STATE.features.length} feature`);
    return;
  }

  // Track existing features
  let avgFx = 0, avgFy = 0, nOk = 0, lostThisFrame = 0;
  if (STATE.features.length > 0) {
    const tracked = trackLK(STATE.prevGray, gray, STATE.features, OF_W, OF_H, {
      winRadius: 4, maxIter: 8, maxResidual: 40,
    });
    const newFeatures = [];
    for (let i = 0; i < tracked.length; i++) {
      const t = tracked[i];
      const old = STATE.features[i];
      if (t.ok) {
        const flowX = t.x - old.x;
        const flowY = t.y - old.y;
        avgFx += flowX; avgFy += flowY; nOk++;
        old.x = t.x; old.y = t.y; old.age = (old.age||0) + 1;
        old.history.push({ x: t.x, y: t.y });
        if (old.history.length > 20) old.history.shift();
        newFeatures.push(old);
      } else {
        lostThisFrame++;
      }
    }
    STATE.features = newFeatures;
    STATE.lostTotal += lostThisFrame;
  }

  // Periodic re-detection if we're losing features
  STATE.redetectCounter++;
  if (STATE.features.length < 30 || STATE.redetectCounter >= 30) {
    STATE.redetectCounter = 0;
    // Detect new features and merge (avoiding existing positions)
    const newSet = detectFeatures(gray);
    const existing = STATE.features;
    const minDist2 = 14*14;
    for (const nf of newSet) {
      let tooClose = false;
      for (const ef of existing) {
        const dx = nf.x - ef.x, dy = nf.y - ef.y;
        if (dx*dx + dy*dy < minDist2) { tooClose = true; break; }
      }
      if (!tooClose && existing.length < 80) existing.push(nf);
    }
  }

  // Update UI
  document.getElementById('i-n').textContent = STATE.features.length;
  document.getElementById('i-lost').textContent = STATE.lostTotal;
  if (nOk > 0) {
    avgFx /= nOk; avgFy /= nOk;
    document.getElementById('i-flow').textContent =
      `Δx ${avgFx.toFixed(1)}  Δy ${avgFy.toFixed(1)}`;
  }

  // Draw on overlay
  const T = getCoverTransform(video.videoWidth, video.videoHeight);
  drawFeatures(T);

  // FPS
  STATE.frames++;
  if (now - STATE.fpsT > 1000) {
    STATE.fps = STATE.frames;
    STATE.frames = 0; STATE.fpsT = now;
    document.getElementById('i-fps').textContent = STATE.fps;
  }

  STATE.prevGray = gray;

  if (STATE.features.length > 0) {
    setStatus(`Tracking ${STATE.features.length} feature attivi`);
  }
}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
document.getElementById('btn-start').addEventListener('click', async () => {
  document.getElementById('splash').style.display = 'none';
  resizeOverlay();
  const ok = await startCamera();
  if (!ok) return;
  setStatus('Camera OK — inizio detection');
  requestAnimationFrame(loop);
});

document.getElementById('tb-trails').addEventListener('click', () => {
  STATE.showTrails = !STATE.showTrails;
  document.getElementById('tb-trails').classList.toggle('on', STATE.showTrails);
});

document.getElementById('tb-reset').addEventListener('click', () => {
  STATE.features = [];
  STATE.prevGray = null;
  STATE.lostTotal = 0;
  setStatus('Reset — re-detection al prossimo frame');
});

window.addEventListener('resize', resizeOverlay);
</script>
</body>
</html>
