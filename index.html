* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#000; color:#fff; overflow:hidden; height:100dvh; width:100vw; }

#splash {
  position:fixed; inset:0; z-index:100; background:#0a0a0f;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1.5rem; padding:2rem; text-align:center;
}
.version { font-size:.65rem; letter-spacing:.12em; opacity:.4; text-transform:uppercase; }
h1 { font-size:2.4rem; letter-spacing:-.02em; text-transform:uppercase; }
h1 span { color:#e8410a; }
#splash p { font-size:.85rem; opacity:.6; max-width:320px; line-height:1.5; }
#splash label { font-size:.7rem; opacity:.7; display:flex; align-items:center; gap:.5rem; }
#splash input { width:60px; padding:.3rem; background:#1a1a22; color:#fff; border:1px solid #333; font-family:Arial; font-size:.85rem; text-align:center; }
button {
  background:#e8410a; color:#fff; border:none;
  padding:.9rem 2.4rem; font-family:Arial,sans-serif; font-size:1rem;
  letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
button:active { opacity:.8; }

#cam { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; }
#c3d { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:2; }
#overlay { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:3; }

#status {
  position:fixed; top:1rem; left:1rem; right:1rem;
  background:rgba(10,10,15,.78); backdrop-filter:blur(10px);
  padding:.55rem .85rem; border-left:3px solid #e8410a;
  font-size:.7rem; letter-spacing:.06em; text-transform:uppercase;
  pointer-events:none; z-index:10;
}

#info {
  position:fixed; bottom:1rem; left:1rem; right:1rem;
  background:rgba(10,10,15,.78); backdrop-filter:blur(10px);
  padding:.65rem .85rem; font-size:.66rem; line-height:1.75;
  pointer-events:none; z-index:10; font-family: 'Courier New', monospace;
}
.kv { display:flex; justify-content:space-between; gap:1rem; }
.kv span:first-child { opacity:.5; }

.tb {
  position:fixed; bottom:7.5rem; right:1rem;
  background:rgba(10,10,15,.78); backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15); color:#fff;
  font-family:Arial; font-size:.65rem; letter-spacing:.06em; text-transform:uppercase;
  padding:.55rem .9rem; cursor:pointer; z-index:11;
}
.tb.on { border-color:#e8410a; color:#e8410a; }

var SVD = SVD || {};
this.SVD = SVD;

SVD.svdcmp = function(a, m, n, w, v){
  var flag, i, its, j, jj, k, l, nm,
      anorm = 0.0, c, f, g = 0.0, h, s, scale = 0.0, x, y, z, rv1 = [];
      
  //Householder reduction to bidiagonal form

    l = i + 1;
    rv1[i] = scale * g;
    g = s = scale = 0.0;
    if (i < m){
      for (k = i; k < m; ++ k){

      if (0.0 !== scale){
        for (k = i; k < m; ++ k){

          s += a[k][i] * a[k][i];

        g = -SVD.sign( Math.sqrt(s), f );
        h = f * g - s;
        a[i][i] = f - g;
        for (j = l; j < n; ++ j){

            s += a[k][i] * a[k][j];
          }
          f = s / h;
          for (k = i; k < m; ++ k){
            a[k][j] += f * a[k][i];
          }

        for (k = i; k < m; ++ k){
          a[k][i] *= scale;
        }
      }
    }
    w[i] = scale * g;
    g = s = scale = 0.0;
    if ( (i < m) && (i !== n - 1) ){
      for (k = l; k < n; ++ k){
        scale += Math.abs( a[i][k] );
      }
      if (0.0 !== scale){
        for (k = l; k < n; ++ k){
          a[i][k] /= scale;
          s += a[i][k] * a[i][k];
        }
        f = a[i][l];
        g = -SVD.sign( Math.sqrt(s), f );
        h = f * g - s;
        a[i][l] = f - g;
        for (k = l; k < n; ++ k){
          rv1[k] = a[i][k] / h;
        }
        for (j = l; j < m; ++ j){
          for (s = 0.0, k = l; k < n; ++ k){
            s += a[j][k] * a[i][k];
          }
          for (k = l; k < n; ++ k){
            a[j][k] += s * rv1[k];
          }
        }
        for (k = l; k < n; ++ k){
          a[i][k] *= scale;
        }
      }
    }
    anorm = Math.max(anorm, ( Math.abs( w[i] ) + Math.abs( rv1[i] ) ) );
  }

  for (i = n - 1; i >= 0; -- i){
    if (i < n - 1){
      if (0.0 !== g){
        for (j = l; j < n; ++ j){
          v[j][i] = ( a[i][j] / a[i][l] ) / g;
        }
        for (j = l; j < n; ++ j){
          for (s = 0.0, k = l; k < n; ++ k){
            s += a[i][k] * v[k][j];
          }
          for (k = l; k < n; ++ k){
            v[k][j] += s * v[k][i];
          }
        }
      }
      for (j = l; j < n; ++ j){
        v[i][j] = v[j][i] = 0.0;
      }
    }
    v[i][i] = 1.0;
    g = rv1[i];
    l = i;
  }

  //Acumulation of left-hand transformation
  for (i = Math.min(n, m) - 1; i >= 0; -- i){
    l = i + 1;
    g = w[i];
    for (j = l; j < n; ++ j){
      a[i][j] = 0.0;
    }
    if (0.0 !== g){
      g = 1.0 / g;
      for (j = l; j < n; ++ j){
        for (s = 0.0, k = l; k < m; ++ k){
          s += a[k][i] * a[k][j];
        }
        f = (s / a[i][i]) * g;
        for (k = i; k < m; ++ k){
          a[k][j] += f * a[k][i];
        }
      }
      for (j = i; j < m; ++ j){
        a[j][i] *= g;
      }
    }else{
        for (j = i; j < m; ++ j){
          a[j][i] = 0.0;
        }
    }
    ++ a[i][i];
  }

  //Diagonalization of the bidiagonal form
  for (k = n - 1; k >= 0; -- k){
    for (its = 1; its <= 30; ++ its){
      flag = true;
      for (l = k; l >= 0; -- l){
        nm = l - 1;
        if ( Math.abs( rv1[l] ) + anorm === anorm ){
          flag = false;
          break;
        }
        if ( Math.abs( w[nm] ) + anorm === anorm ){
          break;
        }
      }
      if (flag){
        c = 0.0;
        s = 1.0;
        for (i = l; i <= k; ++ i){
          f = s * rv1[i];
          if ( Math.abs(f) + anorm === anorm ){
            break;
          }
          g = w[i];
          h = SVD.pythag(f, g);
          w[i] = h;
          h = 1.0 / h;
          c = g * h;
          s = -f * h;
          for (j = 1; j <= m; ++ j){
            y = a[j][nm];
            z = a[j][i];
            a[j][nm] = y * c + z * s;
            a[j][i] = z * c - y * s;
          }
        }
      }

      //Convergence
      z = w[k];
      if (l === k){
        if (z < 0.0){
          w[k] = -z;
          for (j = 0; j < n; ++ j){
            v[j][k] = -v[j][k];
          }
        }
        break;
      }

      if (30 === its){
        return false;
      }

      //Shift from bottom 2-by-2 minor
      x = w[l];
      nm = k - 1;
      y = w[nm];
      g = rv1[nm];
      h = rv1[k];
      f = ( (y - z) * (y + z) + (g - h) * (g + h) ) / (2.0 * h * y);
      g = SVD.pythag( f, 1.0 );
      f = ( (x - z) * (x + z) + h * ( (y / (f + SVD.sign(g, f) ) ) - h) ) / x;

      //Next QR transformation
      c = s = 1.0;
      for (j = l; j <= nm; ++ j){
        i = j + 1;
        g = rv1[i];
        y = w[i];
        h = s * g;
        g = c * g;
        z = SVD.pythag(f, h);
        rv1[j] = z;
        c = f / z;
        s = h / z;
        f = x * c + g * s;
        g = g * c - x * s;
        h = y * s;
        y *= c;
        for (jj = 0; jj < n; ++ jj){
          x = v[jj][j];
          z = v[jj][i];
          v[jj][j] = x * c + z * s;
          v[jj][i] = z * c - x * s;
        }
        z = SVD.pythag(f, h);
        w[j] = z;
        if (0.0 !== z){
          z = 1.0 / z;
          c = f * z;
          s = h * z;
        }
        f = c * g + s * y;
        x = c * y - s * g;
        for (jj = 0; jj < m; ++ jj){
          y = a[jj][j];
          z = a[jj][i];
          a[jj][j] = y * c + z * s;
          a[jj][i] = z * c - y * s;
        }
      }
      rv1[l] = 0.0;
      rv1[k] = f;
      w[k] = x;
    }
  }

  return true;
};

SVD.pythag = function(a, b){
  var at = Math.abs(a), bt = Math.abs(b), ct;

  if (at > bt){
    ct = bt / at;
    return at * Math.sqrt(1.0 + ct * ct);
  }
    
  if (0.0 === bt){
    return 0.0;
  }

  ct = at / bt;
  return bt * Math.sqrt(1.0 + ct * ct);
};

SVD.sign = function(a, b){
  return b >= 0.0? Math.abs(a): -Math.abs(a);
};

CV.Image = function(width, height, data){
  this.width = width || 0;
  this.height = height || 0;

      i = 0, j = 0;

  }

  imageDst.width = imageSrc.width;
  imageDst.height = imageSrc.height;

  return imageDst;
};

CV.threshold = function(imageSrc, imageDst, threshold){

      len = src.length, tab = [], i;

  imageDst.height = imageSrc.height;

  return imageDst;

CV.adaptiveThreshold = function(imageSrc, imageDst, kernelSize, threshold){

  CV.stackBoxBlur(imageSrc, imageDst, kernelSize);

  for (i = 0; i < 768; ++ i){

  for (i = 0; i < len; ++ i){
    dst[i] = tab[ src[i] - dst[i] + 255 ];
  }

  imageDst.width = imageSrc.width;
  imageDst.height = imageSrc.height;

  return imageDst;

CV.otsu = function(imageSrc){

      threshold = 0, sum = 0, sumB = 0, wB = 0, wF = 0, max = 0,
      mu, between, i;

  for (i = 0; i < 256; ++ i){
    hist[i] = 0;
  }

  for (i = 0; i < len; ++ i){
    hist[ src[i] ] ++;

  for (i = 0; i < 256; ++ i){
    sum += hist[i] * i;
  }

  for (i = 0; i < 256; ++ i){
    wB += hist[i];

      wF = len - wB;
      if (0 === wF){

      mu = (sumB / wB) - ( (sum - sumB) / wF );

CV.BlurStack = function(){

CV.stackBoxBlur = function(imageSrc, imageDst, kernelSize){

    stack = stack.next = new CV.BlurStack();

    sum = radius * color;

    stack = stackStart;
    for (i = 0; i < radius; ++ i){
      stack.color = color;
      stack = stack.next;
    }
    for (i = 1; i < radius; ++ i){
      stack.color = src[pos + i];
      sum += stack.color;
      stack = stack.next;

    for (x = 0; x < width; ++ x){

      p = x + radius;
      p = start + (p < widthMinus1? p: widthMinus1);
      sum -= stack.color - src[p];

      stack.color = src[p];
      stack = stack.next;
    }

    pos = x;
    start = pos + width;

    color = dst[pos];
    sum = radius * color;

    stack = stackStart;
    for (i = 0; i < radius; ++ i){
      stack.color = color;
      stack = stack.next;
    }
    for (i = 1; i < radius; ++ i){
      stack.color = dst[start];
      sum += stack.color;
      stack = stack.next;

      start += width;
    }

    stack = stackStart;
    for (y = 0; y < height; ++ y){
      dst[pos] = (sum * mult) >>> shift;

      p = y + radius;
      p = x + ( (p < heightMinus1? p: heightMinus1) * width );

CV.gaussianBlur = function(imageSrc, imageDst, imageMean, kernelSize){
  var kernel = CV.gaussianKernel(kernelSize);

  imageDst.width = imageSrc.width;
  imageDst.height = imageSrc.height;

  imageMean.width = imageSrc.width;
  imageMean.height = imageSrc.height;

  CV.gaussianBlurFilter(imageSrc, imageMean, kernel, true);

CV.gaussianBlurFilter = function(imageSrc, imageDst, kernel, horizontal){

      height = imageSrc.height, width = imageSrc.width,

    for (j = 0; j < width; ++ j){

          cur = pos + k;
          if (j + k < 0){
            cur = pos;
          }
          else if (j + k >= width){
            cur = pos;
          }
        }else{
          cur = pos + (k * width);
          if (i + k < 0){
            cur = pos;
          }

CV.gaussianKernel = function(kernelSize){

    [ [1],
      [0.25, 0.5, 0.25],
      [0.0625, 0.25, 0.375, 0.25, 0.0625],
      [0.03125, 0.109375, 0.21875, 0.28125, 0.21875, 0.109375, 0.03125] ],

  pos = width + 3;

    for (j = 0; j < width; ++ j, ++ pos){
      pix = src[pos];

      if (0 !== pix){
        outer = hole = false;

        if (1 === pix && 0 === src[pos - 1]){
          outer = true;
        }
        else if (pix >= 1 && 0 === src[pos + 1]){
          hole = true;
        }

        if (outer || hole){
          ++ nbd;

          contours.push( CV.borderFollowing(src, pos, nbd, {x: j, y: i}, hole, deltas) );
        }

};

  var contour = [], pos1, pos3, pos4, s, s_end, s_prev;

  contour.hole = hole;

  s = s_end = hole? 0: 4;

    s = (s - 1) & 7;
    pos1 = pos + deltas[s];
    if (src[pos1] !== 0){
      break;
    }

    src[pos] = -nbd;
    contour.push( {x: point.x, y: point.y} );

  }else{
    pos3 = pos;
    s_prev = s ^ 4;

    while(true){
      s_end = s;

AR.Dictionary = function (dicName) {

AR.Dictionary.prototype._initialize = function (dicName) {
  this.codes = {};
  this.codeList = [];
  this.tau = 0;
  this.nBits = 0;
  this.markSize = 0;
  this.dicName = dicName;
  var dictionary = AR.DICTIONARIES[dicName];
  if (!dictionary)
    throw 'The dictionary "' + dicName + '" is not recognized.';
  
  this.nBits = dictionary.nBits;
  this.markSize = Math.sqrt(dictionary.nBits) + 2;
  for (var i = 0; i < dictionary.codeList.length; i++) {
    var code = null;
    if (typeof dictionary.codeList[i] === 'number')
      code = this._hex2bin(dictionary.codeList[i], dictionary.nBits);
    if (typeof dictionary.codeList[i] === 'string')
      code = this._hex2bin(parseInt(dictionary.codeList[i], 16), dictionary.nBits);
    if (Array.isArray(dictionary.codeList[i])) 
      code = this._bytes2bin(dictionary.codeList[i], dictionary.nBits);
    if (code === null) 
      throw 'Invalid code ' + i + ' in dictionary ' + dicName + ': ' + JSON.stringify(dictionary.codeList[i]);
    if (code.length != dictionary.nBits)
      throw 'The code ' + i + ' in dictionary ' + dicName + ' is not ' +  dictionary.nBits + ' bits long but ' + code.length + ': ' + code;
    this.codeList.push(code);
    this.codes[code] = {
      id: i

  }
  this.tau = dictionary.tau || this._calculateTau();

AR.Dictionary.prototype.find = function (bits) {

    var bitRow = bits[i];
    for (j = 0; j < bitRow.length; j++) {
      val += bitRow[j];
    }
  }
  var minFound = this.codes[val];
  if (minFound)
    return {
      id: minFound.id,
      distance: 0
    };

  for (i = 0; i < this.codeList.length; i++) {
    var code = this.codeList[i];
    var distance = this._hammingDistance(val, code);
    if (this._hammingDistance(val, code) < this.tau) {
      if (!minFound || minFound.distance > distance) {

AR.Dictionary.prototype._hex2bin = function (hex, nBits) {

AR.Dictionary.prototype._bytes2bin = function (byteList, nBits) {

    i;

  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+ (size+4) + ' ' + (size+4) + '">';
  svg += '<rect x="0" y="0" width="' + (size+4) + '" height="' + (size+4) + '" fill="white"/>';
  svg += '<rect x="1" y="1" width="' + (size+2) + '" height="' + (size+2) + '" fill="black"/>';
  for(var y=0;y<size;y++) {
    for(var x=0;x<size;x++) {
      if (code[y*size+x]=='1') 
        svg += '<rect x="' + (x+2) + '" y="' + (y+2) + '" width="1" height="1" fill="white"/>';

    this.streamConfig.index = (this.streamConfig.index + 1) % this.streamConfig.imageSize;
    if (this.streamConfig.index == 0) {
      var image = {
        width: this.streamConfig.width,
        height: this.streamConfig.height,

      var markerList = this.detect(image);
      this.streamConfig.callback(image, markerList);

    return this.mjpeg.EOI[0] == element && array.length > index + 1 && this.mjpeg.EOI[1] == array[index + 1];

    return this.mjpeg.SOI[0] == element && array.length > index + 1 && this.mjpeg.SOI[1] == array[index + 1];
  });

  } else {

    if (part1.length) {

    dy2 = candidates[i][2].y - candidates[i][0].y;

    error2 = this.iterate(imagePoints, posRotation2, posTranslation, rotation2, translation2);
  }else{
    error2 = {euclidean: -1.0, pixels: -1, maximum: -1.0};
  }

  for (i = 0; i < 3; ++ i){
    for (j = 0; j < 3; ++ j){
      if (valid1){
        translation1[i] -= rotation1[i][j] * this.objectPoints[0][j];
      }
      if (valid2){
        translation2[i] -= rotation2[i][j] * this.objectPoints[0][j];
      }
    }
  }

  return error1.euclidean < error2.euclidean?
    new POS.Pose(error1.pixels, rotation1, translation1, error2.pixels, rotation2, translation2):
    new POS.Pose(error2.pixels, rotation2, translation2, error1.pixels, rotation1, translation1);
};

POS.Posit.prototype.pos = function(imagePoints, rotation1, rotation2, translation){
  var np = this.objectPoints.length, imageVectors = [],
      i0 = [], j0 = [], ivec = [], jvec = [], row1 = [], row2 = [], row3 = [],
      i0i0, j0j0, i0j0, delta, q, lambda, mu, scale, i, j;

  for (i = 0; i < np; ++ i){
    imageVectors[i] = [imagePoints[i].x - imagePoints[0].x,
                       imagePoints[i].y - imagePoints[0].y];
  }

  //i0 and j0
  for (i = 0; i < 3; ++ i){
    i0[i] = 0.0;
    j0[i] = 0.0;
    for (j = 0; j < np; ++ j){
      i0[i] += this.objectMatrix[i][j] * imageVectors[j][0];
      j0[i] += this.objectMatrix[i][j] * imageVectors[j][1];
    }
  }

  i0i0 = i0[0] * i0[0] + i0[1] * i0[1] + i0[2] * i0[2];
  j0j0 = j0[0] * j0[0] + j0[1] * j0[1] + j0[2] * j0[2];
  i0j0 = i0[0] * j0[0] + i0[1] * j0[1] + i0[2] * j0[2];

  //Lambda and mu
  delta = (j0j0 - i0i0) * (j0j0 - i0i0) + 4.0 * (i0j0 * i0j0);
  
  if (j0j0 - i0i0 >= 0.0){
    q = (j0j0 - i0i0 + Math.sqrt(delta) ) / 2.0;
  }else{
    q = (j0j0 - i0i0 - Math.sqrt(delta) ) / 2.0;
  }
  
  if (q >= 0.0){
    lambda = Math.sqrt(q);
    if (0.0 === lambda){
      mu = 0.0;
    }else{
      mu = -i0j0 / lambda;
    }
  }else{
    lambda = Math.sqrt( -(i0j0 * i0j0) / q);
    if (0.0 === lambda){
      mu = Math.sqrt(i0i0 - j0j0);
    }else{
      mu = -i0j0 / lambda;
    }
  }

  //First rotation
  for (i = 0; i < 3; ++ i){
    ivec[i] = i0[i] + lambda * this.objectNormal[i];
    jvec[i] = j0[i] + mu * this.objectNormal[i];
  }
  
  scale = Math.sqrt(ivec[0] * ivec[0] + ivec[1] * ivec[1] + ivec[2] * ivec[2]);
  
  for (i = 0; i < 3; ++ i){
    row1[i] = ivec[i] / scale;
    row2[i] = jvec[i] / scale;
  }
  
  row3[0] = row1[1] * row2[2] - row1[2] * row2[1];
  row3[1] = row1[2] * row2[0] - row1[0] * row2[2];
  row3[2] = row1[0] * row2[1] - row1[1] * row2[0];

  for (i = 0; i < 3; ++ i){
    rotation1[0][i] = row1[i];
    rotation1[1][i] = row2[i];
    rotation1[2][i] = row3[i];
  }

  //Second rotation
  for (i = 0; i < 3; ++ i){
    ivec[i] = i0[i] - lambda * this.objectNormal[i];
    jvec[i] = j0[i] - mu * this.objectNormal[i];
  }
  
  for (i = 0; i < 3; ++ i){
    row1[i] = ivec[i] / scale;
    row2[i] = jvec[i] / scale;
  }
  
  row3[0] = row1[1] * row2[2] - row1[2] * row2[1];
  row3[1] = row1[2] * row2[0] - row1[0] * row2[2];
  row3[2] = row1[0] * row2[1] - row1[1] * row2[0];
  
  for (i = 0; i < 3; ++ i){
    rotation2[0][i] = row1[i];
    rotation2[1][i] = row2[i];
    rotation2[2][i] = row3[i];
  }

  //Translation
  translation[0] = imagePoints[0].x / scale;
  translation[1] = imagePoints[0].y / scale;
  translation[2] = this.focalLength / scale;
};

POS.Posit.prototype.isValid = function(rotation, translation){
  var np = this.objectPoints.length, zmin = Infinity, i = 0, zi;

  for (; i < np; ++ i){
    zi = translation[2] +
      (rotation[2][0] * this.objectVectors[i][0] +
       rotation[2][1] * this.objectVectors[i][1] +
       rotation[2][2] * this.objectVectors[i][2]);
    if (zi < zmin){
      zmin = zi;
    }
  }

  return zmin >= 0.0;
};

POS.Posit.prototype.iterate = function(imagePoints, posRotation, posTranslation, rotation, translation){
  var np = this.objectPoints.length,
      oldSopImagePoints = [], sopImagePoints = [],
      rotation1 = [[],[],[]], rotation2 = [[],[],[]],
      translation1 = [], translation2 = [],
      converged = false, iteration = 0,
      oldImageDifference, imageDifference, factor,
      error, error1, error2, delta, i, j;

  for (i = 0; i < np; ++ i){
    oldSopImagePoints[i] = {x: imagePoints[i].x,
                            y: imagePoints[i].y};
  }
  
  for (i = 0; i < 3; ++ i){
    for (j = 0; j < 3; ++ j){
      rotation[i][j] = posRotation[i][j];
    }
    translation[i] = posTranslation[i];
  }

  for (i = 0; i < np; ++ i){
    factor = 0.0;
    for (j = 0; j < 3; ++ j){
      factor += this.objectVectors[i][j] * rotation[2][j] / translation[2];
    }
    sopImagePoints[i] = {x: (1.0 + factor) * imagePoints[i].x,
                         y: (1.0 + factor) * imagePoints[i].y};
  }

  imageDifference = 0.0;
  
  for (i = 0; i < np; ++ i){
    imageDifference += Math.abs(sopImagePoints[i].x - oldSopImagePoints[i].x);
    imageDifference += Math.abs(sopImagePoints[i].y - oldSopImagePoints[i].y);
  }

  for (i = 0; i < 3; ++ i){
    translation1[i] = translation[i] -
      (rotation[i][0] * this.objectPoints[0][0] +
       rotation[i][1] * this.objectPoints[0][1] +
       rotation[i][2] * this.objectPoints[0][2]);
  }
  
  error = error1 = this.error(imagePoints, rotation, translation1);

  //Convergence
  converged = (0.0 === error1.pixels) || (imageDifference < 0.01);
  
  while( iteration ++ < 100 && !converged ){
  
    for (i = 0; i < np; ++ i){
      oldSopImagePoints[i].x = sopImagePoints[i].x;
      oldSopImagePoints[i].y = sopImagePoints[i].y;
    }

    this.pos(sopImagePoints, rotation1, rotation2, translation);

    for (i = 0; i < 3; ++ i){
      translation1[i] = translation[i] -
        (rotation1[i][0] * this.objectPoints[0][0] +
         rotation1[i][1] * this.objectPoints[0][1] +
         rotation1[i][2] * this.objectPoints[0][2]);
        
      translation2[i] = translation[i] -
        (rotation2[i][0] * this.objectPoints[0][0] +
         rotation2[i][1] * this.objectPoints[0][1] +
         rotation2[i][2] * this.objectPoints[0][2]);
    }

    error1 = this.error(imagePoints, rotation1, translation1);
    error2 = this.error(imagePoints, rotation2, translation2);

    if ( (error1.euclidean >= 0.0) && (error2.euclidean >= 0.0) ){
      if (error2.euclidean < error1.euclidean){
        error = error2;
        for (i = 0; i < 3; ++ i){
          for (j = 0; j < 3; ++ j){
            rotation[i][j] = rotation2[i][j];
          }
        }
      }else{
        error = error1;
        for (i = 0; i < 3; ++ i){
          for (j = 0; j < 3; ++ j){
            rotation[i][j] = rotation1[i][j];
          }
        }
      }
    }

    if ( (error1.euclidean < 0.0) && (error2.euclidean >= 0.0) ){
      error = error2;
      for (i = 0; i < 3; ++ i){
        for (j = 0; j < 3; ++ j){
          rotation[i][j] = rotation2[i][j];
        }
      }
    }
    
    if ( (error2.euclidean < 0.0) && (error1.euclidean >= 0.0) ){
      error = error1;
      for (i = 0; i < 3; ++ i){
        for (j = 0; j < 3; ++ j){
          rotation[i][j] = rotation1[i][j];
        }
      }
    }

    for (i = 0; i < np; ++ i){
      factor = 0.0;
      for (j = 0; j < 3; ++ j){
        factor += this.objectVectors[i][j] * rotation[2][j] / translation[2];
      }
      sopImagePoints[i].x = (1.0 + factor) * imagePoints[i].x;
      sopImagePoints[i].y = (1.0 + factor) * imagePoints[i].y;
    }

    oldImageDifference = imageDifference;
    imageDifference = 0.0;
    
    for (i = 0; i < np; ++ i){
      imageDifference += Math.abs(sopImagePoints[i].x - oldSopImagePoints[i].x);
      imageDifference += Math.abs(sopImagePoints[i].y - oldSopImagePoints[i].y);
    }

    delta = Math.abs(imageDifference - oldImageDifference);

    converged = (0.0 === error.pixels) || (delta < 0.01);
  }
  
  return error;
};

POS.Posit.prototype.error = function(imagePoints, rotation, translation){
  var np = this.objectPoints.length,
      move = [], projection = [], errorvec = [],
      euclidean = 0.0, pixels = 0.0, maximum = 0.0,
      i, j, k;

  if ( !this.isValid(rotation, translation) ){
    return {euclidean: -1.0, pixels: -1, maximum: -1.0};
  }
  
  for (i = 0; i < np; ++ i){
    move[i] = [];
    for (j = 0; j < 3; ++ j){
      move[i][j] = translation[j];
    }
  }
  
  for (i = 0; i < np; ++ i){
    for (j = 0; j < 3; ++ j){
      for (k = 0; k < 3; ++ k){
        move[i][j] += rotation[j][k] * this.objectPoints[i][k];
      }
    }
  }

  for (i = 0; i < np; ++ i){
    projection[i] = [];
    for (j = 0; j < 2; ++ j){
      projection[i][j] = this.focalLength * move[i][j] / move[i][2];
    }
  }
  
  for (i = 0; i < np; ++ i){
    errorvec[i] = [projection[i][0] - imagePoints[i].x,
                   projection[i][1] - imagePoints[i].y];
  }

  for (i = 0; i < np; ++ i){
    euclidean += Math.sqrt(errorvec[i][0] * errorvec[i][0] +
                           errorvec[i][1] * errorvec[i][1]);
                       
    pixels += Math.abs( Math.round(projection[i][0]) - Math.round(imagePoints[i].x) ) +
              Math.abs( Math.round(projection[i][1]) - Math.round(imagePoints[i].y) );
              
    if (Math.abs(errorvec[i][0]) > maximum){
      maximum = Math.abs(errorvec[i][0]);
    }
    if (Math.abs(errorvec[i][1]) > maximum){
      maximum = Math.abs(errorvec[i][1]);
    }
  }

  return {euclidean: euclidean / np, pixels: pixels, maximum: maximum};
};

POS.pseudoInverse = function(a, n, b){
  var w = [], v = [[],[],[]], s = [[],[],[]],
      wmax = 0.0, cn = 0,
      i, j, k;

  SVD.svdcmp(a, n, 3, w, v);

  for (i = 0; i < 3; ++ i){
    if (w[i] > wmax){
      wmax = w[i];
    }
  }

  wmax *= 0.01;

  for (i = 0; i < 3; ++ i){
    if (w[i] < wmax){
      w[i] = 0.0;
    }
  }

  for (j = 0; j < 3; ++ j){
    if (0.0 === w[j]){
      ++ cn;
      for (k = j; k < 2; ++ k){
        for (i = 0; i < n; ++ i){
          a[i][k] = a[i][k + 1];
        }
        for (i = 0; i < 3; ++ i){
          v[i][k] = v[i][k + 1];
        }
      }
    }
  }

  for (j = 0; j < 2; ++ j){
    if (0.0 === w[j]){
      w[j] = w[j + 1];
    }
  }

  for (i = 0; i < 3; ++ i){
    for (j = 0; j < 3 - cn; ++ j){
      s[i][j] = v[i][j] / w[j];
    }
  }
  
  for (i = 0; i < 3; ++ i){
    for (j = 0; j < n; ++ j){
      b[i][j] = 0.0;
      for (k = 0; k < 3 - cn; ++ k){
        b[i][j] += s[i][k] * a[j][k];
      }
    }
  }
};

POS.Pose = function(error1, rotation1, translation1, error2, rotation2, translation2){
  this.bestError = error1;
  this.bestRotation = rotation1;
  this.bestTranslation = translation1;
  this.alternativeError = error2;
  this.alternativeRotation = rotation2;
  this.alternativeTranslation = translation2;
};

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
'use strict';

const video    = document.getElementById('cam');
const overlay  = document.getElementById('overlay');
const overCtx  = overlay.getContext('2d');
const work     = document.getElementById('work');
const workCtx  = work.getContext('2d', { willReadFrequently: true });
const c3d      = document.getElementById('c3d');

let detector, posit;
let renderer, scene, cam3, markerCube;
let MARKER_SIZE_M = 0.05; // metres — settable from splash
let SHOW_2D = true;

const STATE = {
  camOk:false, threeOk:false,
  detectionsSeen: 0,
  fpsT:0, frameCount:0, fpsLast:0,
  lastMarker: null,
};

function setStatus(t) { document.getElementById('status').textContent = t; }

// ─────────────────────────────────────
// CAMERA
// ─────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    STATE.camOk = true;
    return true;
  } catch(e) { setStatus('Camera non disponibile'); return false; }
}

// ─────────────────────────────────────
// VIDEO → SCREEN MAPPING (object-fit: cover)
// ─────────────────────────────────────
function getCoverTransform(vw, vh) {
  const sw = window.innerWidth, sh = window.innerHeight;
  const vA = vw/vh, sA = sw/sh;
  let scale, offX=0, offY=0;
  if (vA > sA) { scale = sh/vh; offX = (sw - vw*scale)/2; }
  else         { scale = sw/vw; offY = (sh - vh*scale)/2; }
  return { scale, offX, offY, sw, sh, vw, vh };
}

function videoToScreen(px, py, T) {
  return { x: px*T.scale + T.offX, y: py*T.scale + T.offY };
}

// ─────────────────────────────────────
// 2D OVERLAY (marker outline)
// ─────────────────────────────────────
function resizeOverlay() {
  const dpr = window.devicePixelRatio || 1;
  overlay.width  = window.innerWidth  * dpr;
  overlay.height = window.innerHeight * dpr;
  overlay.style.width  = window.innerWidth  + 'px';
  overlay.style.height = window.innerHeight + 'px';
  overCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function draw2D(markers, T) {
  overCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  if (!SHOW_2D || !markers || !markers.length) return;
  for (const m of markers) {
    const pts = m.corners.map(c => videoToScreen(c.x, c.y, T));
    overCtx.beginPath();
    overCtx.moveTo(pts[0].x, pts[0].y);
    for (let i=1; i<4; i++) overCtx.lineTo(pts[i].x, pts[i].y);
    overCtx.closePath();
    overCtx.strokeStyle = '#1a9e5c';
    overCtx.lineWidth = 3;
    overCtx.stroke();
    // numero corners (0 in rosso, gli altri verdi)
    pts.forEach((p, i) => {
      overCtx.fillStyle = i === 0 ? '#e8410a' : '#1a9e5c';
      overCtx.beginPath(); overCtx.arc(p.x, p.y, 6, 0, Math.PI*2); overCtx.fill();
    });
  }
}

// ─────────────────────────────────────
// THREE.JS — camera at origin, world fixed
// We move objects relative to camera based on POSIT
// ─────────────────────────────────────
function initThree() {
  renderer = new THREE.WebGLRenderer({ canvas: c3d, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0, 0);

  scene = new THREE.Scene();

  // Camera placed at world origin, looking down -Z (standard Three.js)
  // We'll match its FOV to the real camera's FOV.
  cam3 = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100);
  cam3.position.set(0, 0, 0);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  const dir = new THREE.DirectionalLight(0xffffff, 0.5);
  dir.position.set(2, 5, 3); scene.add(dir);

  // Marker cube — sits in scene, will be repositioned each frame
  // Cube edge = marker size, sitting on top of marker (centered above plane)
  const s = MARKER_SIZE_M;
  const cubeGeo = new THREE.BoxGeometry(s, s, s);
  const cubeMat = new THREE.MeshPhongMaterial({ color: 0xe8410a, opacity: 0.7, transparent: true });
  markerCube = new THREE.Mesh(cubeGeo, cubeMat);
  // wireframe edges
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(cubeGeo),
    new THREE.LineBasicMaterial({ color: 0xffffff })
  );
  markerCube.add(edges);

  // Axis triad on the cube (corner 0 at the front)
  const ax = new THREE.AxesHelper(s * 1.2);
  markerCube.add(ax);

  markerCube.visible = false;
  scene.add(markerCube);

  STATE.threeOk = true;

  window.addEventListener('resize', () => {
    cam3.aspect = window.innerWidth / window.innerHeight;
    cam3.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    resizeOverlay();
  });
}

// Update Three.js camera FOV to match the real focal length used by POSIT.
// fy_pixels = (image_height/2) / tan(vFov/2)  →  vFov = 2 * atan((H/2) / fy)
function syncFOV(focalPixels, imgH) {
  const vFov = 2 * Math.atan((imgH/2) / focalPixels) * 180 / Math.PI;
  if (Math.abs(cam3.fov - vFov) > 0.5) {
    cam3.fov = vFov;
    cam3.updateProjectionMatrix();
    document.getElementById('i-fov').textContent = vFov.toFixed(1) + '°';
  }
}

// ─────────────────────────────────────
// POSIT → Three.js transform
// ─────────────────────────────────────
// POSIT output:
//   bestTranslation = [tx, ty, tz] — marker position in CAMERA frame
//                                    POSIT camera: X→right, Y→up, Z→forward (into scene)
//   bestRotation    = 3x3 matrix R such that  p_camera = R · p_marker + T
//
// Three.js camera frame: X→right, Y→up, Z→toward viewer (-Z forward)
//
// Conversion: invert Y and Z of the camera frame.
//   v_three = diag(1, -1, -1) · v_posit
//
// For the full 4x4 transform from marker to Three.js camera:
//   M_three = F · M_posit · F⁻¹     where F = diag(1,-1,-1,1)
// But since we're transforming a point that lives in marker frame and we
// want it in Three camera frame, we use:
//   p_three = F · (R · p_marker_local + T)
//
// In Three.js terms: object position = F·T, object rotation = F·R·F
// where F = flip Y and Z. This rewrite uses Three.js primitives directly.

function applyPose(pose) {
  const R = pose.bestRotation;
  const T = pose.bestTranslation;

  // 1) Position: flip Y and Z
  markerCube.position.set( T[0], -T[1], -T[2] );

  // 2) Rotation: build rotation matrix from POSIT, apply F on both sides.
  //    F · R · F  means: negate row 1,2 and column 1,2 (= flip Y,Z axes).
  //    Easier path: build a Three.Matrix4 from POSIT R directly,
  //    then apply rotation around X by 180° on both sides (which is exactly F).
  const m = new THREE.Matrix4();
  // THREE.Matrix4 is row-major in .set()
  m.set(
    R[0][0], R[0][1], R[0][2], 0,
    R[1][0], R[1][1], R[1][2], 0,
    R[2][0], R[2][1], R[2][2], 0,
    0,       0,       0,       1
  );

  // F = rotation 180° around X axis. F·R·F flips Y and Z signs in both rows AND columns.
  const F = new THREE.Matrix4().makeRotationX(Math.PI);
  // Compute F · R · F  (since F = F⁻¹ for 180° rotation, F·R·F⁻¹ == F·R·F)
  const mFinal = new THREE.Matrix4().multiplyMatrices(F, m).multiply(F);

  // Extract quaternion and apply
  const q = new THREE.Quaternion().setFromRotationMatrix(mFinal);
  markerCube.quaternion.copy(q);

  // Reset to autoUpdate so position+quaternion compose normally
  markerCube.matrixAutoUpdate = true;

  // Lift cube so its base sits ON the marker plane:
  // The marker plane in marker-local coords is Z=0. After our flip, the marker plane
  // normal in Three.js world becomes the local +Y of the cube? Actually no —
  // the marker frame: X right, Y up (on marker plane), Z out (normal).
  // After F·R·F, the marker normal in three-space is still the local Z of the cube.
  // To put the cube ABOVE the marker, translate by half-size along the marker's normal.
  // We do this by translating in the cube's LOCAL +Z direction (after rotation).
  const localUp = new THREE.Vector3(0, 0, MARKER_SIZE_M / 2);
  localUp.applyQuaternion(q);
  markerCube.position.add(localUp);

  markerCube.visible = true;
}

// ─────────────────────────────────────
// DETECTION + RENDER LOOP
// ─────────────────────────────────────
let lastDetect = 0;
const DETECT_INTERVAL = 80; // ms

function loop(now) {
  requestAnimationFrame(loop);
  if (!STATE.camOk || !STATE.threeOk || !detector) return;

  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw) return;

  if (now - lastDetect >= DETECT_INTERVAL) {
    lastDetect = now;
    work.width = vw; work.height = vh;
    workCtx.drawImage(video, 0, 0);

    let img;
    try { img = workCtx.getImageData(0, 0, vw, vh); } catch(e) { return; }

    let markers;
    try { markers = detector.detect(img); } catch(e) { return; }

    const T = getCoverTransform(vw, vh);
    draw2D(markers, T);

    if (markers && markers.length > 0) {
      const m = markers[0];
      STATE.lastMarker = m;
      document.getElementById('i-id').textContent = m.id;

      // POSIT
      // Focal length estimate for iPhone back camera: ~width * 0.85
      const focalPx = vw * 0.85;
      if (!posit) posit = new POS.Posit(MARKER_SIZE_M, focalPx);
      // corners centered at image center, Y flipped to match POSIT convention
      const corners = m.corners.map(c => ({ x: c.x - vw/2, y: vh/2 - c.y }));
      let pose;
      try { pose = posit.pose(corners); } catch(e) { return; }
      if (pose) {
        applyPose(pose);
        syncFOV(focalPx, vh);
        const T_ = pose.bestTranslation;
        const dist = Math.sqrt(T_[0]*T_[0]+T_[1]*T_[1]+T_[2]*T_[2]);
        document.getElementById('i-d').textContent = dist.toFixed(2) + ' m';
        const p = markerCube.matrix.elements; // m41, m42, m43 in column-major
        document.getElementById('i-p').textContent =
          `${p[12].toFixed(2)},${p[13].toFixed(2)},${p[14].toFixed(2)}`;
        setStatus(`Marker ${m.id} — ${dist.toFixed(2)}m`);
        STATE.detectionsSeen++;
      }
    } else {
      // Hide cube after a brief grace period (1 sec without detection)
      if (now - lastDetect > 1000) markerCube.visible = false;
    }
  }

  renderer.render(scene, cam3);

  // FPS
  STATE.frameCount++;
  if (now - STATE.fpsT > 1000) {
    STATE.fpsLast = STATE.frameCount;
    STATE.frameCount = 0; STATE.fpsT = now;
    document.getElementById('i-fps').textContent = STATE.fpsLast;
  }
}

// ─────────────────────────────────────
// BOOT
// ─────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', async () => {
  const sizeMm = parseFloat(document.getElementById('marker-size').value);
  if (sizeMm > 0) MARKER_SIZE_M = sizeMm / 1000;
  document.getElementById('splash').style.display = 'none';
  resizeOverlay();

  if (typeof AR === 'undefined' || typeof POS === 'undefined') {
    setStatus('ERR: ArUco/POSIT non caricati');
    return;
  }
  if (typeof THREE === 'undefined') {
    setStatus('ERR: Three.js non caricato');
    return;
  }

  detector = new AR.Detector();
  initThree();
  const ok = await startCamera();
  if (!ok) return;
  setStatus(`Pronto — marker ${(MARKER_SIZE_M*1000).toFixed(0)}mm — punta un marker`);
  requestAnimationFrame(loop);
});

document.getElementById('tb-2d').addEventListener('click', () => {
  SHOW_2D = !SHOW_2D;
  document.getElementById('tb-2d').classList.toggle('on', SHOW_2D);
  if (!SHOW_2D) overCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
});
document.getElementById('tb-2d').classList.add('on');
</script>
